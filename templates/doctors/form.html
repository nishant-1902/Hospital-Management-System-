{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} | Doctors | AHMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div><h1 class="h3 mb-1">{{ title }}</h1><p class="text-muted mb-0">Doctor profile, linked login, and availability.</p></div>
    <a href="{% url 'doctors:index' %}" class="btn btn-outline-secondary">Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            {% crispy form %}
            <div class="d-flex justify-content-end gap-2 mt-4">
                <a href="{% url 'doctors:index' %}" class="btn btn-outline-secondary">Cancel</a>
                <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk me-1"></i> {{ submit_label }}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
