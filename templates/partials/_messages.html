{% if messages %}
    {% for message in messages %}
        <div class="toast ahms-message-toast border-0 mb-2" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags|default:'info' }}{% endif %} d-flex align-items-center justify-content-between gap-3 mb-0 py-2">
                <div>
                    {% if message.tags == 'success' %}
                        <i class="fa-solid fa-circle-check me-2"></i>
                    {% elif message.tags == 'error' or message.tags == 'danger' %}
                        <i class="fa-solid fa-circle-exclamation me-2"></i>
                    {% elif message.tags == 'warning' %}
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>
                    {% else %}
                        <i class="fa-solid fa-circle-info me-2"></i>
                    {% endif %}
                    {{ message }}
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    {% endfor %}
{% endif %}
