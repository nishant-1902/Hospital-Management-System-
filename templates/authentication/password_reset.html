{% extends "base.html" %}

{% block title %}Password Reset | AHMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Reset Password</h1>
                <p class="text-muted">Enter your account email and AHMS will send a secure reset link.</p>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.email.id_for_label }}" class="form-label">Email address</label>
                        {{ form.email }}
                        {% for error in form.email.errors %}<div class="text-danger small mt-1">{{ error }}</div>{% endfor %}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send reset link</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
